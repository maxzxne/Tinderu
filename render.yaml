services:
  - type: web
    name: tinderu
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATA_DIR
        value: /data
    disk:
      name: tinderu-data
      mountPath: /data
      sizeGB: 1
